<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Anotações da Estufa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    h1 { margin-bottom: 10px; }
    form {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 8px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }
    th {
      background: #eee;
    }
  </style>
</head>
<body>

<h1>Anotações da Estufa</h1>

<form id="dataForm">
  <input type="number" id="fileira" placeholder="Fileira" required>
  <input type="number" id="planta" placeholder="Planta" required>
  <input type="number" id="altura" placeholder="Altura (cm)" required>
  <input type="text" id="observacoes" placeholder="Observações">
  <button type="submit">Salvar</button>
</form>

<button onclick="exportarExcel()">Exportar para Excel</button>

<table id="tabela">
  <thead>
    <tr>
      <th>Fileira</th>
      <th>Planta</th>
      <th>Altura (cm)</th>
      <th>Observações</th>
      <th>Data</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
  const dados = [];
  const tbody = document.querySelector('#tabela tbody');

  document.getElementById('dataForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const fileira = document.getElementById('fileira').value;
    const planta = document.getElementById('planta').value;
    const altura = document.getElementById('altura').value;
    const obs = document.getElementById('observacoes').value;
    const data = new Date().toLocaleDateString('pt-BR');

    const registro = { fileira, planta, altura, obs, data };
    dados.push(registro);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${fileira}</td>
      <td>${planta}</td>
      <td>${altura}</td>
      <td>${obs}</td>
      <td>${data}</td>
    `;
    tbody.appendChild(tr);

    this.reset();
    document.getElementById('fileira').focus();
  });

  function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Estufa');
    XLSX.writeFile(wb, 'anotacoes_estufa.xlsx');
  }
</script>

</body>
</html>
